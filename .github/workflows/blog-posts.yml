name: Blog Posts

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Update README with latest posts
        run: |
          curl -sH "Accept: application/vnd.github.v3.raw" "https://api.github.com/repos/qingjian0/qingjian0.github.io/contents/docs/blog" > /tmp/blog.json
          echo "Blog contents fetched"
      - name: Commit
        run: |
          git config user.name "qingjian0"
          git config user.email "qingjian0@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "update blog"
          git push
