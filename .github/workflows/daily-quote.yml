name: Daily Profile Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Update daily quote
        run: python scripts/update_readme.py
      - name: Commit changes
        run: |
          git config user.name 'qingjian0'
          git config user.email 'qingjian0@users.noreply.github.com'
          git add README.md
          git diff --staged --quiet || git commit -m 'daily quote update'
          git push
